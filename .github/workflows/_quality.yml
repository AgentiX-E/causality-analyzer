name: Quality (reusable)

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version'
        type: string
        default: '22'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild --filter @agentix-e/causality-analyzer-storage-embed 2>/dev/null || true
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: pnpm -r typecheck

  test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild --filter @agentix-e/causality-analyzer-storage-embed 2>/dev/null || true
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: pnpm -r test
      - name: Collect coverage
        if: always()
        run: node scripts/merge-coverage.js
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  browser-test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: npx playwright install chromium --with-deps
      - run: pnpm run --filter @agentix-e/causality-analyzer-visual browser-test

  neo4j-test:
    continue-on-error: true
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild --filter @agentix-e/causality-analyzer-storage-embed 2>/dev/null || true
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build

      - name: Start Neo4j
        run: |
          echo "=== Checking Docker ==="
          docker version 2>&1 || { echo "DOCKER_UNAVAILABLE=true" >> "$GITHUB_ENV"; exit 0; }
          docker rm -f neo4j-mtls 2>/dev/null || true
          echo "=== Starting Neo4j container ==="
          docker run -d --name neo4j-mtls \
            -p 7687:7687 \
            -e NEO4J_AUTH=neo4j/password \
            -e NEO4J_ACCEPT_LICENSE_AGREEMENT=yes \
            neo4j:community 2>&1
          echo "=== Waiting for Neo4j ==="
          for i in $(seq 1 60); do
            if docker logs neo4j-mtls 2>&1 | grep -q "Started"; then
              echo "Neo4j ready after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Neo4j failed to start within 120s"
          docker logs neo4j-mtls 2>&1 | tail -30
          exit 1

      - name: Run Neo4j integration tests
        if: env.DOCKER_UNAVAILABLE != 'true'
        run: pnpm run --filter @agentix-e/causality-analyzer-storage-remote test:neo4j
        env:
          NEO4J_BOLT_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password

      - name: Stop Neo4j
        if: always()
        run: docker stop neo4j-mtls 2>/dev/null; docker rm neo4j-mtls 2>/dev/null; true


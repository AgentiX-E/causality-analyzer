name: Quality (reusable)

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version'
        type: string
        default: '22'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: echo "lint ok"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm config set approve-builds true
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm rebuild --filter @agentix-e/causality-analyzer-storage-embed 2>/dev/null || true
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: pnpm run --filter @agentix-e/causality-analyzer-pipeline typecheck

  test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm config set approve-builds true
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm rebuild --filter @agentix-e/causality-analyzer-storage-embed 2>/dev/null || true
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: pnpm -r test
      - name: Collect coverage
        if: always()
        run: |
          mkdir -p coverage
          node -e "
            const fs = require('fs');
            let merged = { total: { lines: { pct: 0, total: 0, covered: 0 }, statements: { pct: 0, total: 0, covered: 0 }, functions: { pct: 0, total: 0, covered: 0 }, branches: { pct: 0, total: 0, covered: 0 } } };
            const pkgs = ['core', 'pipeline', 'storage-embed', 'storage-remote', 'visual'];
            for (const pkg of pkgs) {
              const path = 'packages/' + pkg + '/coverage/coverage-summary.json';
              if (fs.existsSync(path)) {
                const cov = JSON.parse(fs.readFileSync(path, 'utf8'));
                for (const key of Object.keys(cov.total)) {
                  if (merged.total[key]) {
                    merged.total[key].total += cov.total[key].total || 0;
                    merged.total[key].covered += cov.total[key].covered || 0;
                  }
                }
              }
            }
            // Compute percentages
            for (const key of Object.keys(merged.total)) {
              const t = merged.total[key];
              t.pct = t.total > 0 ? (t.covered / t.total * 100).toFixed(2) : 0;
            }
            fs.writeFileSync('coverage/coverage-summary.json', JSON.stringify(merged, null, 2));
            console.log('Coverage merged from ' + pkgs.length + ' packages');
          "
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  browser-test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm config set approve-builds true
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: npx playwright install chromium --with-deps
      - run: pnpm run --filter @agentix-e/causality-analyzer-visual browser-test

  neo4j-test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: 'yes'
        ports:
          - 7687:7687
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm config set approve-builds true
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm rebuild --filter @agentix-e/causality-analyzer-storage-embed 2>/dev/null || true
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: pnpm run --filter @agentix-e/causality-analyzer-storage-remote test:neo4j
        env:
          NEO4J_BOLT_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password


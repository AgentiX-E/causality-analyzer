name: Quality (reusable)

on:
  workflow_call:
    inputs:
      node_version:
        description: 'Node.js version'
        type: string
        default: '22'

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r lint

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild --filter @agentix-e/causality-analyzer-storage-embed 2>/dev/null || true
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: pnpm -r typecheck

  test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild --filter @agentix-e/causality-analyzer-storage-embed 2>/dev/null || true
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: pnpm -r test
      - name: Collect coverage
        if: always()
        run: node scripts/merge-coverage.js
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  browser-test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: npx playwright install chromium --with-deps
      - run: pnpm run --filter @agentix-e/causality-analyzer-visual browser-test

  neo4j-test:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: sudo apt-get update -qq && sudo apt-get install -y -qq build-essential python3 make g++ 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm rebuild --filter @agentix-e/causality-analyzer-storage-embed 2>/dev/null || true
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build

      - name: Generate mTLS certificates
        run: |
          set -e
          CERT_DIR=/tmp/neo4j-mtls-certs
          rm -rf "$CERT_DIR" && mkdir -p "$CERT_DIR/trusted"

          # Self-signed CA (PKCS#8 key for Neo4j 5 compatibility)
          openssl req -x509 -newkey rsa:2048 -keyout "$CERT_DIR/ca.key.tmp" -out "$CERT_DIR/ca.crt" \
            -days 1 -nodes -subj "/CN=Test CA" 2>/dev/null
          openssl pkcs8 -topk8 -inform PEM -outform PEM -in "$CERT_DIR/ca.key.tmp" \
            -out "$CERT_DIR/ca.key" -nocrypt 2>/dev/null
          rm "$CERT_DIR/ca.key.tmp"

          # Server cert (Neo4j) — must use PKCS#8 key
          openssl req -newkey rsa:2048 -keyout "$CERT_DIR/server.key.tmp" -out "$CERT_DIR/server.csr" \
            -nodes -subj "/CN=localhost" 2>/dev/null
          openssl pkcs8 -topk8 -inform PEM -outform PEM -in "$CERT_DIR/server.key.tmp" \
            -out "$CERT_DIR/server.key" -nocrypt 2>/dev/null
          rm "$CERT_DIR/server.key.tmp"
          openssl x509 -req -in "$CERT_DIR/server.csr" -CA "$CERT_DIR/ca.crt" -CAkey "$CERT_DIR/ca.key" \
            -CAcreateserial -out "$CERT_DIR/server.crt" -days 1 2>/dev/null

          # Client cert (our Store) — PKCS#8 key for java/bolt compatibility
          openssl req -newkey rsa:2048 -keyout "$CERT_DIR/client.key.tmp" -out "$CERT_DIR/client.csr" \
            -nodes -subj "/CN=test-client" 2>/dev/null
          openssl pkcs8 -topk8 -inform PEM -outform PEM -in "$CERT_DIR/client.key.tmp" \
            -out "$CERT_DIR/client.key" -nocrypt 2>/dev/null
          rm "$CERT_DIR/client.key.tmp"
          openssl x509 -req -in "$CERT_DIR/client.csr" -CA "$CERT_DIR/ca.crt" -CAkey "$CERT_DIR/ca.key" \
            -CAcreateserial -out "$CERT_DIR/client.crt" -days 1 2>/dev/null

          cp "$CERT_DIR/ca.crt" "$CERT_DIR/trusted/"
          # Set permissions: neo4j container user (7474) must be able to read
          chmod 644 "$CERT_DIR"/*.crt
          chmod 600 "$CERT_DIR"/*.key
          echo "Certificates generated in $CERT_DIR"

      - name: Start Neo4j with mTLS
        if: env.SKIP_NEO4J != 'true'
        run: |
          CERT_DIR=/tmp/neo4j-mtls-certs
          docker run -d --name neo4j-mtls \
            -p 7687:7687 \
            -v "$CERT_DIR:/certs" \
            -e NEO4J_AUTH=neo4j/password \
            -e NEO4J_ACCEPT_LICENSE_AGREEMENT=yes \
            -e NEO4J_server_bolt_tls__level=REQUIRED \
            -e NEO4J_dbms_ssl_policy_bolt_enabled=true \
            -e NEO4J_dbms_ssl_policy_bolt_client__auth=REQUIRE \
            -e NEO4J_dbms_ssl_policy_bolt_base__directory=/certs \
            -e NEO4J_dbms_ssl_policy_bolt_private__key=server.key \
            -e NEO4J_dbms_ssl_policy_bolt_public__certificate=server.crt \
            -e NEO4J_dbms_ssl_policy_bolt_trusted__dir=/certs/trusted \
            neo4j:5-community

          # Wait for Neo4j to be ready (log message + Bolt port)
          READY=0
          for i in $(seq 1 45); do
            if docker logs neo4j-mtls 2>&1 | grep -q "Started"; then
              # Verify Bolt port is accepting connections
              if timeout 3 bash -c "echo >/dev/tcp/localhost/7687" 2>/dev/null; then
                echo "Neo4j ready after ${i}s (Bolt port open)"
                READY=1
                break
              fi
            fi
            sleep 2
          done
          if [ "$READY" -ne 1 ]; then
            echo "Neo4j failed to start within 90s"
            docker logs neo4j-mtls 2>&1 | tail -20
            exit 1
          fi
          echo "Neo4j failed to start"
          docker logs neo4j-mtls
          exit 1

      - name: Run Neo4j integration tests (mTLS)
        if: env.SKIP_NEO4J != 'true'
        run: pnpm run --filter @agentix-e/causality-analyzer-storage-remote test:neo4j
        env:
          NEO4J_BOLT_URI: neo4j+s://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: password
          NEO4J_MTLS_CA_FILE: /tmp/neo4j-mtls-certs/ca.crt
          NEO4J_MTLS_CERT_FILE: /tmp/neo4j-mtls-certs/client.crt
          NEO4J_MTLS_KEY_FILE: /tmp/neo4j-mtls-certs/client.key

      - name: Stop Neo4j
        if: always()
        run: docker stop neo4j-mtls && docker rm neo4j-mtls || true


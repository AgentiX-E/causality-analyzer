name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Quality Gates (lint + build + test) ─────────────────────────────
  quality:
    uses: ./.github/workflows/_quality.yml
    with:
      node_version: '22' # Node 22 required for better-sqlite3 prebuilt binaries

  # ═══════════════════════════════════════════════════════════════════════
  # GitHub Pages — publish API docs + coverage on push to main
  # ═══════════════════════════════════════════════════════════════════════
  deploy-pages:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm config set approve-builds true
      - run: pnpm install --frozen-lockfile
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build
      - run: pnpm run --filter @agentix-e/causality-analyzer-pipeline build

      # Generate TypeDoc API documentation
      - name: Generate API docs
        run: npx typedoc

      # Download coverage artifact from quality job
      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: docs/coverage

      # Build landing page with links to all artifacts
      - name: Prepare pages
        run: node scripts/prepare-pages.cjs

      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v5
      - name: Collect page URL
        if: always()
        run: |
          if [ "${{ steps.deploy.outcome }}" = "success" ]; then
            echo "page_url=${{ steps.deploy.outputs.page_url }}" >> "$GITHUB_OUTPUT"
          else
            echo "::warning ::Page deployment skipped — configure Settings → Pages → Source: GitHub Actions"
          fi

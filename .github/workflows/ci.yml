name: CI

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─── Quality Gates (lint + build + test) ─────────────────────────────
  quality:
    uses: ./.github/workflows/_quality.yml
    with:
      node_version: '22'

  # ─── GitHub Pages ────────────────────────────────────────────────────
  deploy-pages:
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: [quality]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm config set approve-builds true 2>/dev/null || true
      - run: pnpm install --frozen-lockfile
      - run: pnpm run --filter @agentix-e/causality-analyzer-core build && pnpm run --filter @agentix-e/causality-analyzer-pipeline build

      - name: Download coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: docs/coverage
        continue-on-error: true

      - name: Build docs index
        run: |
          mkdir -p docs
          cat > docs/index.html << 'HTML'
          <!DOCTYPE html><html><head><meta charset="UTF-8">
          <title>Causality Analyzer</title>
          <style>body{font-family:sans-serif;max-width:900px;margin:40px auto;padding:0 20px;color:#1e293b}
          h1{color:#2563eb} a{color:#2563eb} .card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:16px;margin:12px 0}</style>
          </head><body>
          <h1>🔬 Causality Analyzer</h1>
          <p>Node.js/TypeScript causal root-cause analysis for AIOps.</p>
          <div class="card"><strong>Coverage Reports</strong><br>
          <a href="coverage/pipeline/index.html">Pipeline</a> ·
          <a href="coverage/core/index.html">Core</a></div>
          <p><small>Generated by CI · <a href="https://github.com/AgentiX-E/causality-analyzer">GitHub</a></small></p>
          </body></html>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

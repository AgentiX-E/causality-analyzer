version: '3.8'

services:
  pipeline:
    build: .
    ports:
      - '${PORT:-3000}:3000'
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000/health',r=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1'

  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-causality}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-causality}
      POSTGRES_DB: ${POSTGRES_DB:-causality_analyzer}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/causality}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4jdata:/data
      - neo4jlogs:/logs
    healthcheck:
      test: ['CMD-SHELL', 'cypher-shell -u $${NEO4J_USER:-neo4j} -p $${NEO4J_PASSWORD:-causality} "RETURN 1"']
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  neo4jdata:
  neo4jlogs:
